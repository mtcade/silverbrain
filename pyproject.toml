[project]
name = "silverbrain"
version = "0.1.0"
description = "AI for Tabular Engineering"
readme = "README.md"
authors = [
    { name = "Evan Mason" }
]
requires-python = ">=3.13"
dependencies = [
    "jable",
    "polars >=1.30, <2",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
license = "Apache-2.0"
license-files = ["LICENSE"]


[project.scripts]
silverbrain = "silverbrain:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
jable = { path = "../jable" }
