[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "silverbrain"
version = "0.0.1"
authors = [
  { name="Evan Mason" }
]
description = "tabular ai"
keywords = ["tabular","storage","ai"]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "duckdb >= 1.3.0, <2"
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
license = "Apache-2.0"
license-files = ["LICENSE"]
